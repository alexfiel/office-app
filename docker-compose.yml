services:
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    container_name: postgres_db
    restart: always
    ports:
      - "5434:5432"

    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: office_app

    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    hostname: adminer
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
